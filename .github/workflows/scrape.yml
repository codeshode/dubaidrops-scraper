name: Daily Property Scraper
on:
  # Daily at 00:00 UTC (04:00 Dubai). Resumed 2026-05-26 after the BASIC-plan
  # RapidAPI quota reset for the new billing cycle (Apr 26 → May 26).
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install supabase
      - name: Run property scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scraper.py
      - name: Run DLD enrichment
        # Run even if the scraper step failed (e.g. RapidAPI 429 quota).
        # DLD is independent and free — losing it because of RapidAPI would be silly.
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python dld_enrichment.py
